<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research Agent — Efficient LLM Inference</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { --bg:#0f1115; --card:#1a1d24; --fg:#e6e6e6; --muted:#9aa0a6; --accent:#6ea8fe; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--fg); line-height:1.6; }
    .wrap { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }
    h1 { margin:0 0 4px; font-size: 1.6rem; }
    p.sub { color:var(--muted); margin-top:0; }
    .box { display:flex; gap:8px; margin: 20px 0 8px; }
    textarea { flex:1; resize:vertical; min-height:60px; padding:12px; border-radius:8px; border:1px solid #2a2f3a; background:var(--card); color:var(--fg); font:inherit; }
    button { padding:0 20px; border:0; border-radius:8px; background:var(--accent); color:#06122b; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
    .chip { font-size:.85rem; color:var(--accent); border:1px solid #2a2f3a; border-radius:999px; padding:4px 10px; cursor:pointer; background:transparent; }
    #status { color:var(--muted); min-height:1.4em; margin:10px 0; font-size:.9rem; }
    #answer { background:var(--card); border:1px solid #2a2f3a; border-radius:10px; padding:4px 20px; }
    #answer:empty { display:none; }
    a { color:var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Research Agent</h1>
    <p class="sub">A retrieval-augmented agent over 77 arXiv papers on efficient LLM inference. Ask a question — it retrieves, reasons, and answers with citations.</p>

    <div class="chips" id="chips"></div>
    <div class="box">
      <textarea id="q" placeholder="e.g. How does FlashAttention reduce memory I/O?"></textarea>
      <button id="ask">Ask</button>
    </div>
    <div id="status"></div>
    <div id="answer"></div>
  </div>

  <script>
    const examples = [
      "How does FlashAttention reduce memory I/O?",
      "Compare H2O, SnapKV, and Scissorhands KV-cache eviction.",
      "How can speculative decoding be made effective at large batch sizes?",
    ];
    const chips = document.getElementById("chips");
    const q = document.getElementById("q");
    const btn = document.getElementById("ask");
    const status = document.getElementById("status");
    const answer = document.getElementById("answer");

    examples.forEach(ex => {
      const b = document.createElement("button");
      b.className = "chip"; b.textContent = ex;
      b.onclick = () => { q.value = ex; ask(); };
      chips.appendChild(b);
    });

    async function ask() {
      const question = q.value.trim();
      if (!question) return;
      btn.disabled = true;
      answer.innerHTML = "";
      status.textContent = "Thinking… (multi-step agent, ~30–60s)";
      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        if (res.status === 429) {
          status.textContent = "⏳ Rate limit reached — wait a minute and try again.";
          return;
        }
        if (!res.ok) { status.textContent = "Error: HTTP " + res.status; return; }
        const data = await res.json();
        answer.innerHTML = marked.parse(data.answer);
        status.textContent = `Answered in ${data.timing.total_seconds}s · ${data.iterations} iterations · ~$${data.usage.estimated_cost_usd}`;
      } catch (e) {
        status.textContent = "Network error: " + e.message;
      } finally {
        btn.disabled = false;
      }
    }
    btn.onclick = ask;
    q.addEventListener("keydown", e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) ask(); });
  </script>
</body>
</html>
